name: Backend CI-CD (Test & Deploy)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: Linting (Code Quality)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Linters
        run: pip install flake8 black

      - name: Python Lint (Flake8)
        run: flake8 backend/

      - name: Python Format Check (Black)
        run: black --check backend/

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Lint (TFLint)
        run: |
          tflint --init
          tflint -f compact terraform/

  # JOB 2: Test the Python Code (Only if Lint passes)
  test:
    runs-on: ubuntu-latest
    needs: [lint] # FAIL FAST: Don't test if code is messy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pytest moto pytest-cov boto3

      - name: Run Pytest
        working-directory: backend
        run: |
          pytest --cov=app test_app.py

  # JOB 3: Deploy Infrastructure (Only if Test passes)
  deploy:
    runs-on: ubuntu-latest
    needs: [test] # THIS IS THE GATEKEEPER
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' # Only apply on push to main
        run: terraform apply -auto-approve